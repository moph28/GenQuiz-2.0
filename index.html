<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenQuiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>GenQuiz</h1>
    <p>Select your role</p>

    <div class="roles">

        <div class="card" onclick="selectRole('teacher')">
            <h2>Teacher</h2>
            <p>Create and manage quizzes</p>
        </div>

        <div class="card" onclick="selectRole('student')">
            <h2>Student</h2>
            <p>Take quizzes and view results</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
