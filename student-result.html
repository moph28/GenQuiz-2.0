<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Result | GenQuiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="brand-row compact">
        <div class="brand-icon small">GQ</div>
        <div>
          <h1 class="auth-title">Quiz Result</h1>
          <p class="auth-subtitle">Your quiz attempt has been recorded.</p>
        </div>
      </div>

      <div id="student-result-box" class="account-box">
        <p><strong>Username:</strong> <span id="result-student-username">--</span></p>
        <p><strong>Quiz Code:</strong> <span id="result-quiz-code">--</span></p>
        <p><strong>Score:</strong> <span id="result-score">--</span></p>
        <p><strong>Total Items:</strong> <span id="result-total">--</span></p>
        <p><strong>Percentage:</strong> <span id="result-percentage">--</span></p>
      </div>

      <div class="button-stack top-gap">
        <a class="primary-btn" href="student-access.html">Take Another Quiz</a>
        <a class="secondary-btn" href="index.html">Back to Role Selection</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
